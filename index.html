<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>扫码测试</title>

  <!-- 更稳定的CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    #reader {
      width: 300px;
      margin: auto;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <h2>扫码工具</h2>

  <button onclick="startScan()">开始扫码</button>

  <p>按钮点击次数1：<span id="count">0</span></p>

  <div id="reader" style="display:none;"></div>

  <h3>扫描结果：</h3>
  <p id="result">暂无</p>

  <script>
    let scanner;
    let count = 0; // 点击次数

    async function startScan() {
        count++;
        document.getElementById("count").innerText = count;
        document.getElementById("reader").style.display = "block";
    
        // 如果已经有实例在运行，先停止它（或者简单点，每次创建前清空）
        if (scanner) {
            try {
                await scanner.stop();
            } catch (e) {
                // 忽略停止报错
            }
        }
    
        scanner = new Html5Qrcode("reader");
    
        scanner.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (decodedText) => {
                document.getElementById("result").innerText = decodedText;
                scanner.stop();
                document.getElementById("reader").style.display = "none";
            }
        ).catch(err => {
            // 【关键】把错误显示出来，方便调试
            document.getElementById("result").innerText = "错误: " + err;
            console.error("相机启动失败：", err);
        });
    }
  </script>

</body>
</html>
