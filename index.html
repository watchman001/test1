<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>扫码测试</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    #reader {
      width: 300px;
      margin: auto;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <h2>扫码工具</h2>

  <button onclick="startScan()">开始扫码</button>

  <div id="reader" style="display:none;"></div>

  <h3>扫描结果：</h3>
  <p id="result">暂无</p>

  <script>
    let scanner;

    function startScan() {
      document.getElementById("reader").style.display = "block";

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" }, // 后置摄像头
        {
          fps: 10,
          qrbox: 250
        },
        (decodedText) => {
          // 成功扫描
          document.getElementById("result").innerText = decodedText;

          scanner.stop();
          document.getElementById("reader").style.display = "none";
        },
        (errorMessage) => {
          // 可以忽略扫描过程中的错误
        }
      );
    }
  </script>

</body>
</html>
