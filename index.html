<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码测试</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #reader { width: 100%; max-width: 400px; margin: 10px auto; min-height: 250px; border: 1px solid #ccc; }
        button { padding: 12px 24px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 5px; }
        #status { color: #666; font-size: 14px; margin: 10px; }
    </style>
</head>
<body>

    <h2>简易扫码器</h2>
    
    <div id="status">等待操作...</div>
    <button onclick="startScan()">唤起摄像头</button>
    
    <p>点击计数：<span id="count">0</span></p>

    <div id="reader"></div>

    <h3>扫描结果：</h3>
    <p id="result" style="word-break: break-all; color: red;">暂无</p>

    <script>
        var html5QrCode;
        var count = 0;

        function updateStatus(msg) {
            document.getElementById("status").innerText = msg;
        }

        function startScan() {
            count++;
            document.getElementById("count").innerText = count;
            updateStatus("正在尝试启动相机...");

            // 1. 如果已有实例，先清理
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    doStart();
                }).catch(() => {
                    doStart();
                });
            } else {
                doStart();
            }
        }

        function doStart() {
            // 每次重新实例对象以确保状态干净
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    // 成功扫码
                    document.getElementById("result").innerText = decodedText;
                    updateStatus("扫码成功！");
                    html5QrCode.stop();
                }
            ).catch(err => {
                // 捕获报错并显示在页面上
                document.getElementById("result").innerText = "错误详情: " + err;
                updateStatus("启动失败，请检查HTTPS环境或权限");
            });
        }
    </script>
</body>
</html>
