<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>扫码测试</title>

  <!-- 更稳定的CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    #reader {
      width: 300px;
      margin: auto;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <h2>扫码工具</h2>

  <button onclick="startScan()">开始扫码</button>

  <p>按钮点击次数：<span id="count">0</span></p>

  <div id="reader" style="display:none;"></div>

  <h3>扫描结果：</h3>
  <p id="result">暂无</p>

  <script>
    let scanner;
    let count = 0; // 点击次数

    function startScan() {
      // 点击次数 +1
      count++;
      document.getElementById("count").innerText = count;

      document.getElementById("reader").style.display = "block";

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: 250
        },
        (decodedText) => {
          // 扫码成功
          document.getElementById("result").innerText = decodedText;

          scanner.stop();
          document.getElementById("reader").style.display = "none";
        },
        (errorMessage) => {
          // 忽略错误
        }
      );
    }
  </script>

</body>
</html>
